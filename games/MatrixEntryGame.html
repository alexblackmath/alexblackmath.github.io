<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matrix Entry Practice</title>

  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2937;
      background: #f3f4f6;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .game {
      width: min(100%, 34rem);
      padding: 2rem;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 0.75rem 2rem rgb(0 0 0 / 0.10);
      text-align: center;
    }

    h1 { margin-top: 0; }

    #matrix {
      min-height: 9rem;
      display: grid;
      place-items: center;
      overflow-x: auto;
      font-size: 1.35rem;
    }

    .question {
      margin: 1rem 0;
      font-size: 1.15rem;
    }

    .answer-row {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    input, button {
      font: inherit;
      border-radius: 0.5rem;
    }

    input {
      width: 8rem;
      padding: 0.65rem;
      border: 1px solid #9ca3af;
      text-align: center;
    }

    button {
      padding: 0.65rem 1rem;
      border: 0;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    button.secondary {
      margin-top: 1rem;
      background: #4b5563;
    }

    #feedback {
      min-height: 1.5rem;
      margin: 1rem 0 0;
      font-weight: 700;
    }

    #score {
      color: #4b5563;
    }
  </style>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js"></script>
</head>

<body>
  <main class="game">
    <h1>Matrix Entry Practice</h1>
    <p id="score">Score: 0 / 0</p>

    <div id="matrix" aria-label="Matrix A"></div>

    <p class="question">
      What is <span id="prompt"></span>?
    </p>

    <form id="answer-form" class="answer-row">
      <label>
        <span class="sr-only"></span>
        <input
          id="answer"
          type="number"
          inputmode="numeric"
          required
          autocomplete="off"
          aria-label="Matrix entry value"
        >
      </label>
      <button type="submit">Check</button>
    </form>

    <p id="feedback" aria-live="polite"></p>
    <button id="new-matrix" class="secondary" type="button">New matrix</button>
  </main>

  <script>
    const matrixElement = document.querySelector('#matrix');
    const promptElement = document.querySelector('#prompt');
    const answerForm = document.querySelector('#answer-form');
    const answerInput = document.querySelector('#answer');
    const feedbackElement = document.querySelector('#feedback');
    const scoreElement = document.querySelector('#score');
    const newMatrixButton = document.querySelector('#new-matrix');

    let matrix = [];
    let targetRow = 0;
    let targetColumn = 0;
    let correctAnswers = 0;
    let attempts = 0;

    function randomInteger(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function matrixToLatex(values) {
      const rows = values.map(row => row.join(' & ')).join(' \\\\ ');
      return `\\[A = \\begin{pmatrix}${rows}\\end{pmatrix}\\]`;
    }

    async function renderMath() {
      if (window.MathJax?.typesetPromise) {
        await MathJax.typesetPromise([matrixElement, promptElement]);
      }
    }

    async function makeNewMatrix() {
      const rowCount = randomInteger(2, 4);
      const columnCount = randomInteger(2, 4);

      matrix = Array.from(
        { length: rowCount },
        () => Array.from(
          { length: columnCount },
          () => randomInteger(-9, 9)
        )
      );

      matrixElement.textContent = matrixToLatex(matrix);
      feedbackElement.textContent = '';
      chooseNewEntry();
      await renderMath();
    }

    async function chooseNewEntry() {
      targetRow = randomInteger(0, matrix.length - 1);
      targetColumn = randomInteger(0, matrix[0].length - 1);

      promptElement.textContent =
        `\\(A_{${targetRow + 1},${targetColumn + 1}}\\)`;

      answerInput.value = '';
      answerInput.focus();
      await renderMath();
    }

    function updateScore() {
      scoreElement.textContent = `Score: ${correctAnswers} / ${attempts}`;
    }

    answerForm.addEventListener('submit', async event => {
      event.preventDefault();

      const submittedAnswer = Number(answerInput.value);
      const correctAnswer = matrix[targetRow][targetColumn];
      attempts += 1;

      if (submittedAnswer === correctAnswer) {
        correctAnswers += 1;
        feedbackElement.textContent = 'Correct!';
        updateScore();

        window.setTimeout(() => {
          feedbackElement.textContent = '';
          chooseNewEntry();
        }, 600);
      } else {
        feedbackElement.textContent = 'Not quite — try again.';
        updateScore();
        answerInput.select();
      }
    });

    newMatrixButton.addEventListener('click', makeNewMatrix);

    window.addEventListener('load', makeNewMatrix);
  </script>
</body>
</html>
